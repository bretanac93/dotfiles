unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded config!"

set -g prefix C-s
set -g default-terminal "tmux-256color"
set -s set-clipboard on

set-window-option -g mode-keys vi

# Copy to system clipboard with 'y' in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Also copy with Enter key in copy mode
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse selection automatically copies to clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Alternative: Ctrl+c to copy (like most apps)
bind-key -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste from clipboard with prefix + p (outside copy mode)
bind-key p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

set -g mouse on
set -as terminal-features ',xterm-ghostty:RGB,osc7'
set -as terminal-overrides ',*:Hls=\E]8;id=%p1%s;%p2%s\E\\:Hlr=\E]8;;\E\\'

set -g base-index 1
setw -g pane-base-index 1

# Vim style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


# Resize panel to the left (Ctrl+h)
bind-key -n C-h resize-pane -L 5

# Resize panel downward (Ctrl+j)
bind-key -n C-j resize-pane -D 5

# Resize panel to the upward (Ctrl+h)
bind-key -n C-k resize-pane -U 5

# Resize panel to the right (Ctrl+j)
bind-key -n C-l resize-pane -R 5

# Open a new window using the current path.
bind c new-window -c "#{pane_current_path}"

bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

set -g set-titles on
setw -g monitor-activity on

# Don't show distracting notifications
set -g visual-bell off
set -g visual-activity off
set -g focus-events on
set -g detach-on-destroy off
set -s escape-time 0

set-option -g status-left-length 100
set-option -g status-right-length 100
set-option -g status-left " #{session_name}  "
set-option -g status-right " "

set-option -g status-style "fg=#545c7e bg=default" # Screencast mode

set-option -g window-status-format "#{window_index}󰿟#{pane_current_command} "
set-option -g window-status-current-format "#[fg=#545c7e]#{window_index}󰿟#[fg=#E9E9EA]#{pane_current_command} "

set-option -g window-status-current-style "fg=#E9E9EA"
set-option -g window-status-activity-style none
set-option -g pane-active-border-style "fg=#1f2335"
set-option -g pane-border-style "fg=#1f2335"

# Setup 'v' to begin selection as in Vim
if-shell -b '[ "$(echo "$TMUX_VERSION >= 2.4" | bc)" = 1 ]' \
    'bind-key -T copy-mode-vi v send-keys -X begin-selection;'


bind y run -b "tmux show-buffer | pbcopy"\; display-message "Copied tmux buffer to system clipboard"

# ==========================================
# System Clipboard Integration
# ==========================================

# Mouse drag copies to system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste from clipboard with prefix + P
bind-key P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ==========================================
# Vim Mode Enhancements
# ==========================================

# Better visual mode in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle  # Block selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Quick window navigation (Alt+h/l - like vim's gt/gT)
bind-key -n M-h previous-window
bind-key -n M-l next-window

# Swap windows with vim-style keys (Alt+Shift+h/l)
bind-key -n M-H swap-window -t -1
bind-key -n M-L swap-window -t +1

# Better split shortcuts (v/s like vim)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# Kill window/pane with vim-style (prefix + x, like :x)
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key X confirm-before -p "kill-window #W? (y/n)" kill-window

# Jump to specific window with vim-style (prefix + number)
bind-key 0 select-window -t 10
bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9
