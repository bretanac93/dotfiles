unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded config!"

set -g prefix C-s
set -g default-terminal "tmux-256color"
set -s set-clipboard on
set-window-option -g mode-keys vi

# Ghostty terminal features
set -as terminal-features ',xterm-ghostty:RGB,osc7'
set -as terminal-overrides ',*:Hls=\E]8;id=%p1%s;%p2%s\E\\:Hlr=\E]8;;\E\\'

# Mouse support
set -g mouse on

# ==========================================
# Clipboard — platform-aware (macOS / Linux Wayland)
# ==========================================

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "command -v pbcopy >/dev/null 2>&1 && pbcopy || wl-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "command -v pbcopy >/dev/null 2>&1 && pbcopy || wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "command -v pbcopy >/dev/null 2>&1 && pbcopy || wl-copy"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Word navigation
bind-key -T copy-mode-vi w send-keys -X next-word
bind-key -T copy-mode-vi b send-keys -X previous-word
bind-key -T copy-mode-vi e send-keys -X next-word-end

# Paste (prefix + p / P)
bind-key p run "{ command -v pbpaste >/dev/null 2>&1 && pbpaste || wl-paste; } | tmux load-buffer - && tmux paste-buffer"
bind-key P run "{ command -v pbpaste >/dev/null 2>&1 && pbpaste || wl-paste; } | tmux load-buffer - && tmux paste-buffer"

# Copy tmux buffer to clipboard (prefix + y)
bind y run -b "tmux show-buffer | { command -v pbcopy >/dev/null 2>&1 && pbcopy || wl-copy; }" \; display-message "Copied to clipboard"

# ==========================================
# Windows & Panes
# ==========================================

set -g base-index 1
setw -g pane-base-index 1

# New window preserving current path
bind c new-window -c "#{pane_current_path}"

# Splits (also preserve current path)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Kill with confirmation
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key X confirm-before -p "kill-window #W? (y/n)" kill-window

# Vim-style pane focus
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resize (Ctrl + hjkl, no prefix)
bind-key -n C-h resize-pane -L 5
bind-key -n C-j resize-pane -D 5
bind-key -n C-k resize-pane -U 5
bind-key -n C-l resize-pane -R 5

# Window navigation (Alt + h/l, no prefix)
bind-key -n M-h previous-window
bind-key -n M-l next-window

# Swap windows (Alt + Shift + h/l, no prefix)
bind-key -n M-H swap-window -t -1
bind-key -n M-L swap-window -t +1

# Jump to window by number
bind-key 0 select-window -t 10
bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9

# ==========================================
# Behaviour
# ==========================================

set -g set-titles on
setw -g monitor-activity on
set -g visual-bell off
set -g visual-activity off
set -g focus-events on
set -g detach-on-destroy off
set -s escape-time 0

# ==========================================
# Status Bar
# ==========================================

set-option -g status-left-length 100
set-option -g status-right-length 100
set-option -g status-left " #{session_name}  "
set-option -g status-right " "

set-option -g status-style "fg=#545c7e bg=default"

set-option -g window-status-format "#{window_index}󰿟#{pane_current_command} "
set-option -g window-status-current-format "#[fg=#545c7e]#{window_index}󰿟#[fg=#E9E9EA]#{pane_current_command} "
set-option -g window-status-current-style "fg=#E9E9EA"
set-option -g window-status-activity-style none
set-option -g pane-active-border-style "fg=#1f2335"
set-option -g pane-border-style "fg=#1f2335"
