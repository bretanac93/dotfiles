#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# Nord palette
$nord0 = rgb(2e3440)
$nord1 = rgb(3b4252)
$nord2 = rgb(434c5e)
$nord3 = rgb(4c566a)
$nord4 = rgb(d8dee9)
$nord8 = rgb(88c0d0)
$nord9 = rgb(81a1c1)
$nord10 = rgb(5e81ac)

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 6
    gaps_out = 14

    border_size = 2

    col.active_border = $nord9 $nord8 45deg
    col.inactive_border = rgba(4c566a88)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 0.97
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(2e344055)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        noise = 0.02
        contrast = 1.05
        brightness = 0.95
        vibrancy = 0.12
        vibrancy_darkness = 0.2
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    bezier = nordSmooth, 0.2, 0.9, 0.3, 1.0
    bezier = nordFade, 0.4, 0.0, 0.2, 1.0

    animation = windows, 1, 4, nordSmooth, slide
    animation = windowsIn, 1, 4, nordSmooth, slide
    animation = windowsOut, 1, 3, nordFade, popin 80%
    animation = border, 1, 5, nordSmooth
    animation = fade, 1, 3, nordFade
    animation = layers, 1, 4, nordSmooth, fade
    animation = workspaces, 1, 3, nordFade, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 1
}
