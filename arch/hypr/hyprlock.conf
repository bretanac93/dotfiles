background {
    monitor =
    path = /home/cesar/.config/wallpaper.png
    blur_passes = 2
    blur_size = 6
    noise = 0.0117
    contrast = 0.95
    brightness = 0.8
    vibrancy = 0.15
    vibrancy_darkness = 0.2
}

general {
    hide_cursor = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(d8dee9ff)
    font_size = 88
    font_family = JetBrainsMono Nerd Font Mono ExtraBold
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(81a1c1ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 68
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.24
    dots_center = true
    outer_color = rgba(4c566acc)
    inner_color = rgba(2e3440dd)
    font_color = rgba(d8dee9ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##81a1c1">Password</span>
    hide_input = false
    check_color = rgba(88c0d0ff)
    fail_color = rgba(bf616aff)
    fail_text = <span foreground="##bf616a">Authentication failed</span>
    capslock_color = rgba(ebcb8bff)
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = locked
    color = rgba(d8dee9cc)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -92
    halign = center
    valign = center
}
